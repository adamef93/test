networks:
  browser:
    external:
      name: browser
services:
  chrome:
    image: lscr.io/linuxserver/chrome:latest
    container_name: chrome-test
    network_mode: browser
    env_file: stack.env
    group_add:
      - '993'
    devices:
      - /dev/dri/:/dev/dri/
    volumes:
      - /chungus/browser:/config/Downloads
    shm_size: "1gb"
